<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sua Plataforma</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="bg-blur-elements">
        <div class="circle cyan"></div>
        <div class="circle purple"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <header>
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Acesse sua conta</h1>
                <p>Entre com seu usuário e senha abaixo.</p>
            </header>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" placeholder="Digite seu usuário" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Entrar na plataforma</button>
            </form>

            <footer class="form-footer">
                <a href="#">Esqueceu a senha?</a>
                <span>Não tem conta? <a href="#">Criar agora</a></span>
            </footer>
        </div>
    </main>

    <script>
        // Inicializa os ícones
        lucide.createIcons();

        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Logica temporária de teste
            console.log("Tentativa de login:", { user, pass });
            alert(`Bem-vindo, ${user}! Redirecionando...`);
            
            // Aqui você faria o fetch para sua API na Vercel
        }
    </script>
</body>
</html>
