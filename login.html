<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso HUB | Alpha</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        /* Indicador de Modo (Login/Registro) */
        .mode-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .system-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .status-pulse {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse-violet 1.5s infinite;
        }

        @keyframes pulse-violet {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="auth-wrapper">
        <div class="glass-card auth-card fade-in">
            
            <div class="system-badge">
                <div class="status-pulse"></div>
                Sistema Alpha v.4
            </div>

            <h1 id="auth-title" style="font-size: 1.8rem; font-weight: 900; margin-bottom: 5px;">Entrar</h1>
            <p id="auth-subtitle" style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 25px;">Valide suas credenciais de acesso.</p>

            <div class="mode-selector">
                <button class="mode-btn active" id="mode-login" onclick="setMode(true)">Login</button>
                <button class="mode-btn" id="mode-reg" onclick="setMode(false)">Registro</button>
            </div>

            <form id="loginForm">
                <div class="input-field">
                    <label>Identificação</label>
                    <div class="field-container">
                        <i data-lucide="user" class="field-icon"></i>
                        <input type="text" id="userInput" placeholder="Nome ou HUB_00000000" required>
                    </div>
                </div>

                <div class="input-field">
                    <label>Chave de Segurança</label>
                    <div class="field-container">
                        <i data-lucide="key" class="field-icon"></i>
                        <input type="password" id="passInput" placeholder="Sua senha" required>
                    </div>
                </div>

                <button type="submit" class="cta-button" style="margin-top: 10px;">
                    <span id="btn-label">Acessar Terminal</span>
                    <i data-lucide="shield-check"></i>
                </button>
            </form>

            <p style="text-align: center; margin-top: 25px; font-size: 0.7rem; color: var(--text-dim); opacity: 0.5;">
                Conexão criptografada via Protocolo Violet.
            </p>
        </div>
    </main>

    <script>
        lucide.createIcons();

        let isLoginMode = true;

        function setMode(isLogin) {
            isLoginMode = isLogin;
            document.getElementById('mode-login').classList.toggle('active', isLogin);
            document.getElementById('mode-reg').classList.toggle('active', !isLogin);
            
            document.getElementById('auth-title').textContent = isLogin ? "Entrar" : "Registrar";
            document.getElementById('auth-subtitle').textContent = isLogin ? 
                "Valide suas credenciais de acesso." : "Crie um novo ID clássico no sistema.";
            document.getElementById('btn-label').textContent = isLogin ? 
                "Acessar Terminal" : "Gerar Nova Conta";
            
            lucide.createIcons();
        }

        // Função para gerar o ID clássico HUB_00000000
        function generateID() {
            const rand = Math.floor(10000000 + Math.random() * 90000000);
            return `HUB_${rand}`;
        }

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            
            if(!isLoginMode) {
                // REGISTRO
                const newID = generateID();
                const profile = {
                    name: user,
                    hubID: newID,
                    handle: user.toLowerCase().replace(/\s/g, ''),
                    bio: "Novo membro da rede Alpha.",
                    img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`,
                    created: new Date().toLocaleDateString('pt-BR')
                };
                localStorage.setItem("profile", JSON.stringify(profile));
                alert(`CONTA GERADA!\nSeu ID: ${newID}\n\nUse seu nome para logar.`);
                setMode(true);
            } else {
                // LOGIN
                const saved = JSON.parse(localStorage.getItem("profile"));
                if(saved && (user === saved.name || user === saved.hubID)) {
                    window.location.href = 'dashboard.html';
                } else if (user === "admin") {
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Credenciais inválidas ou ID não localizado.");
                }
            }
        };
    </script>
</body>
</html>
