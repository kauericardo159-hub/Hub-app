<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-blur-elements">
        <div class="circle cyan"></div>
        <div class="circle purple"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <header>
                <div class="icon-box">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1>Portal de Acesso</h1>
                <p>Insira suas credenciais para continuar.</p>
            </header>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">Nome de usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" placeholder="Digite seu usuário" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#" class="forgot-link">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-primary">Entrar no Sistema</button>
            </form>

            <footer class="card-footer">
                <span>Não tem uma conta? <a href="#">Criar agora</a></span>
            </footer>
        </div>
    </main>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Impede o recarregamento da página

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simulação de lógica de autenticação
            console.log("Tentativa de login:", { user, pass });
            
            // Exemplo de feedback visual simples
            const btn = document.querySelector('.btn-primary');
            btn.innerText = "Autenticando...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                alert(`Bem-vindo, ${user}! Redirecionando...`);
                // window.location.href = "dashboard.html"; 
            }, 1500);
        }
    </script>
</body>
</html>
