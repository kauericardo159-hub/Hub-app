<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | Central de Comando</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="index-page">

    <div id="vortex-toast-container"></div>

    <div id="post-modal" class="z-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closePostModal()">&times;</button>
            <div id="modal-post-body"></div>
            <div class="modal-comments-section">
                <h3>Comentários</h3>
                <div id="modal-comments-list"></div>
                <div class="comment-input-area">
                    <input type="text" id="input-comment" placeholder="Escreva um comentário...">
                    <button onclick="sendComment()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <header class="z-main-header">
        <div class="header-inner">
            <div class="logo-area" onclick="location.reload()">
                <span class="z-logo">VORTEX</span>
                <div class="server-status">
                    <span class="status-pulse"></span> ONLINE
                </div>
            </div>
            
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="global-search" placeholder="Buscar na rede..." onkeyup="liveSearch()">
            </div>

            <div class="user-action-zone">
                <div class="icon-btn" onclick="showToast('Sincronizando com o servidor...', 'info')">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <img src="" id="top-bar-avatar" class="mini-pfp" onclick="location.href='Perfil.html'">
            </div>
        </div>
    </header>

    <div class="z-container">
        
        <aside class="z-sidebar-left">
            <div class="sticky-side">
                <nav class="nav-card">
                    <a href="index.html" class="nav-item active"><i class="fa-solid fa-house-chimney"></i> Feed</a>
                    <a href="Explorar.html" class="nav-item"><i class="fa-solid fa-fire-flame-curved"></i> Explorar</a>
                    <a href="Perfil.html" class="nav-item"><i class="fa-solid fa-id-card"></i> Perfil</a>
                    <a href="Mensagens.html" class="nav-item"><i class="fa-solid fa-comment-dots"></i> Chats</a>
                    <a href="Ajustes.html" class="nav-item"><i class="fa-solid fa-gear"></i> Sistema</a>
                </nav>

                <div class="trending-card">
                    <h3>Tendências</h3>
                    <div class="trend-item"><span>#VortexCore</span><small>2.4k z-cards</small></div>
                    <div class="trend-item"><span>#CyberDev</span><small>1.1k z-cards</small></div>
                    <div class="trend-item"><span>#ProjectZ_Update</span><small>890 z-cards</small></div>
                </div>
            </div>
        </aside>

        <main class="z-feed-main">
            
            <div class="z-composer" id="main-composer">
                <div class="composer-top">
                    <img src="" id="composer-avatar" class="mini-pfp">
                    <textarea id="post-text" placeholder="O que você está pensando?" oninput="autoGrow(this)"></textarea>
                </div>

                <div id="media-preview-area" class="preview-grid"></div>

                <div class="composer-footer">
                    <div class="attachment-tools">
                        <label class="tool-btn">
                            <i class="fa-solid fa-photo-film"></i>
                            <input type="file" id="media-upload" hidden accept="image/*,video/*" multiple>
                        </label>
                        <button class="tool-btn"><i class="fa-solid fa-face-smile"></i></button>
                        <button class="tool-btn" onclick="insertTag()"><i class="fa-solid fa-hashtag"></i></button>
                    </div>
                    <button class="btn-publish" id="publish-trigger">
                        <span>Publicar</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <div id="main-feed" class="post-flow">
                </div>
        </main>

        <aside class="z-sidebar-right">
            <div class="status-card">
                <h3>Monitor de Operadores</h3>
                <div id="online-list" class="user-status-list"></div>
            </div>
            
            <div class="vortex-ads">
                <p>Servidor VORTEX estável. Conexão criptografada ponta-a-ponta.</p>
            </div>
        </aside>

    </div>

    <nav class="mobile-dock">
        <a href="index.html" class="active"><i class="fa-solid fa-house"></i></a>
        <a href="Explorar.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="Perfil.html"><i class="fa-solid fa-user"></i></a>
        <a href="Notificacoes.html"><i class="fa-solid fa-bell"></i></a>
    </nav>

    <script>
        // --- CONFIGURAÇÃO GLOBAL ---
        let posts = JSON.parse(localStorage.getItem('vortex_posts')) || [];
        let stagedMedia = [];
        let currentOpenPostId = null;

        window.onload = () => {
            initUserInterface();
            renderFeed();
            setupMediaHandlers();
            loadOnlineUsers();
            
            // Listener do botão de publicar
            document.getElementById('publish-trigger').onclick = publishZCard;

            showToast("Conectado ao Nexus v4.0", "success");
        };

        // --- SISTEMA DE TOASTS (BALÕES) ---
        function showToast(text, type = 'info') {
            const container = document.getElementById('vortex-toast-container');
            const toast = document.createElement('div');
            toast.className = `vortex-toast ${type}`;
            
            const icons = {
                success: 'fa-circle-check',
                error: 'fa-circle-exclamation',
                info: 'fa-circle-info'
            };

            toast.innerHTML = `
                <i class="fa-solid ${icons[type]}"></i>
                <span>${text}</span>
            `;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // --- MANIPULAÇÃO DE MÍDIA ---
        function setupMediaHandlers() {
            const uploadInput = document.getElementById('media-upload');
            uploadInput.addEventListener('change', function() {
                const files = Array.from(this.files);
                
                files.forEach(file => {
                    if (stagedMedia.length >= 4) {
                        showToast("Limite de 4 mídias por post", "error");
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const mediaObj = { 
                            id: Date.now() + Math.random(),
                            data: e.target.result, 
                            type: file.type 
                        };
                        stagedMedia.push(mediaObj);
                        renderPreview();
                    };
                    reader.readAsDataURL(file);
                });
            });
        }

        function renderPreview() {
            const area = document.getElementById('media-preview-area');
            area.innerHTML = '';
            stagedMedia.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                const isVid = m.type.includes('video');
                div.innerHTML = `
                    <button class="remove-media" onclick="removeMedia(${index})">&times;</button>
                    ${isVid ? `<video src="${m.data}"></video>` : `<img src="${m.data}">`}
                `;
                area.appendChild(div);
            });
        }

        function removeMedia(index) {
            stagedMedia.splice(index, 1);
            renderPreview();
        }

        // --- MOTOR DE PUBLICAÇÃO ---
        function publishZCard() {
            const textInput = document.getElementById('post-text');
            const content = textInput.value.trim();

            if (!content && stagedMedia.length === 0) {
                showToast("O post não pode estar vazio!", "error");
                return;
            }

            const newPost = {
                id: Date.now(),
                user: localStorage.getItem('nexus_name') || 'Usuário Vortex',
                handle: localStorage.getItem('nexus_handle') || 'vortex.user',
                avatar: localStorage.getItem('nexus_profile') || '',
                content: content,
                media: [...stagedMedia],
                likes: 0,
                comments: [],
                timestamp: new Date().toISOString()
            };

            posts.unshift(newPost);
            localStorage.setItem('vortex_posts', JSON.stringify(posts));
            
            // Reset
            textInput.value = '';
            stagedMedia = [];
            renderPreview();
            renderFeed();
            showToast("Transmitido com sucesso!", "success");
        }

        // --- RENDERIZAÇÃO DO FEED ---
        function renderFeed(query = '') {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = '';

            const filtered = posts.filter(p => 
                p.content.toLowerCase().includes(query.toLowerCase()) || 
                p.user.toLowerCase().includes(query.toLowerCase())
            );

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'z-card-post';
                card.onclick = (e) => {
                    if(!e.target.closest('button') && !e.target.closest('i')) openPostModal(p.id);
                };
                
                let mediaHtml = '';
                if(p.media && p.media.length > 0) {
                    mediaHtml = `<div class="post-media-grid m-${p.media.length}">`;
                    p.media.forEach(m => {
                        mediaHtml += m.type.includes('video') ? 
                            `<video src="${m.data}" muted loop onmouseover="this.play()" onmouseleave="this.pause()"></video>` : 
                            `<img src="${m.data}">`;
                    });
                    mediaHtml += `</div>`;
                }

                card.innerHTML = `
                    <div class="post-head">
                        <img src="${p.avatar || 'https://via.placeholder.com/50'}" class="mini-pfp">
                        <div class="post-u-info">
                            <b>${p.user}</b>
                            <span>@${p.handle} • ${formatDate(p.timestamp)}</span>
                        </div>
                        <i class="fa-solid fa-ellipsis-vertical post-options"></i>
                    </div>
                    <div class="post-body">${p.content.replace(/\n/g, '<br>')}</div>
                    ${mediaHtml}
                    <div class="post-foot">
                        <button onclick="handleLike(${p.id})"><i class="fa-regular fa-heart"></i> ${p.likes}</button>
                        <button onclick="openPostModal(${p.id})"><i class="fa-regular fa-comment"></i> ${p.comments.length}</button>
                        <button><i class="fa-solid fa-share-nodes"></i></button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // --- SISTEMA DE VISUALIZAÇÃO (MODAL) ---
        function openPostModal(id) {
            currentOpenPostId = id;
            const post = posts.find(p => p.id === id);
            const modal = document.getElementById('post-modal');
            const body = document.getElementById('modal-post-body');
            
            body.innerHTML = `
                <div class="post-head">
                    <img src="${post.avatar}" class="mini-pfp">
                    <div class="post-u-info"><b>${post.user}</b><span>@${post.handle}</span></div>
                </div>
                <div class="post-body" style="font-size: 1.2rem; margin: 20px 0;">${post.content}</div>
                <div class="modal-media-view">${renderModalMedia(post.media)}</div>
                <div class="post-timestamp">${new Date(post.timestamp).toLocaleString()}</div>
            `;

            renderComments();
            modal.style.display = 'flex';
        }

        function closePostModal() {
            document.getElementById('post-modal').style.display = 'none';
        }

        function renderComments() {
            const post = posts.find(p => p.id === currentOpenPostId);
            const list = document.getElementById('modal-comments-list');
            list.innerHTML = post.comments.length ? '' : '<p class="empty-msg">Seja o primeiro a comentar.</p>';
            
            post.comments.forEach(c => {
                list.innerHTML += `
                    <div class="comment-item">
                        <img src="${c.avatar}" class="mini-pfp" style="width:30px; height:30px">
                        <div class="comment-content">
                            <b>${c.user}</b>
                            <p>${c.text}</p>
                        </div>
                    </div>
                `;
            });
        }

        function sendComment() {
            const input = document.getElementById('input-comment');
            if(!input.value.trim()) return;

            const postIndex = posts.findIndex(p => p.id === currentOpenPostId);
            posts[postIndex].comments.push({
                user: localStorage.getItem('nexus_name'),
                avatar: localStorage.getItem('nexus_profile'),
                text: input.value.trim()
            });

            localStorage.setItem('vortex_posts', JSON.stringify(posts));
            input.value = '';
            renderComments();
            renderFeed(); // Atualiza contador no feed
            showToast("Comentário enviado", "success");
        }

        // --- UTILITÁRIOS ---
        function initUserInterface() {
            const pfp = localStorage.getItem('nexus_profile') || 'https://via.placeholder.com/100';
            document.getElementById('top-bar-avatar').src = pfp;
            document.getElementById('composer-avatar').src = pfp;
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
        }

        function autoGrow(el) {
            el.style.height = "auto";
            el.style.height = (el.scrollHeight) + "px";
        }

        function liveSearch() {
            const q = document.getElementById('global-search').value;
            renderFeed(q);
        }

        function renderModalMedia(mediaArray) {
            if(!mediaArray.length) return '';
            return mediaArray.map(m => m.type.includes('video') ? `<video src="${m.data}" controls></video>` : `<img src="${m.data}">`).join('');
        }

        function loadOnlineUsers() {
            const list = document.getElementById('online-list');
            const fakeUsers = [
                {name: 'Cipher', status: 'Orbitando'},
                {name: 'Nexus_Core', status: 'Sistêmico'},
                {name: 'Ghost_Shell', status: 'Ativo'}
            ];
            fakeUsers.forEach(u => {
                list.innerHTML += `<div class="online-user"><b>${u.name}</b> <span>${u.status}</span></div>`;
            });
        }
    </script>
</body>
</html>
