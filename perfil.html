<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Alpha | HTML HUB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos Exclusivos para a Identidade Alfanumérica */
        .identity-card {
            margin-top: -50px;
            position: relative;
            z-index: 20;
        }

        .id-badge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .id-badge-container::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--primary), transparent 30%);
            animation: rotate-border 6s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        .id-label {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .id-value {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--success);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            letter-spacing: 2px;
        }

        .copy-chip {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }

        .copy-chip:hover { background: var(--primary); color: white; }

        .stat-grid-premium {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 10px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-item i { width: 18px; color: var(--secondary); margin-bottom: 8px; }
        .stat-item strong { display: block; font-size: 0.8rem; }
        .stat-item span { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }

    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="profile-layout">
        
        <div class="glass-card profile-main-card fade-in">
            <div class="banner-wrapper">
                <div id="profileBanner" class="banner-img"></div>
                <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg-dark));"></div>
            </div>

            <div class="avatar-container identity-card">
                <div class="avatar-ring online" id="statusRing">
                    <img id="profileImg" src="" alt="User Avatar">
                </div>
            </div>

            <div class="user-meta" style="text-align: center;">
                <h2 id="profileName" style="font-size: 1.8rem; font-weight: 900;">A carregar...</h2>
                <span id="profileHandle" style="color: var(--primary); font-weight: 700; font-size: 0.9rem;">@handle</span>

                <div class="id-badge-container">
                    <span class="id-label">Assinatura Digital HUB</span>
                    <span id="displayHubID" class="id-value">HUB_XXXXXXXX</span>
                    <div class="copy-chip" onclick="copyID()">
                        <i data-lucide="copy"></i>
                        Copiar ID
                    </div>
                </div>

                <p id="profileBio" style="color: var(--text-dim); font-size: 0.85rem; line-height: 1.5; margin: 15px 0;">
                    A carregar biografia do utilizador...
                </p>

                <div class="stat-grid-premium">
                    <div class="stat-item">
                        <i data-lucide="shield-check"></i>
                        <strong>Verificado</strong>
                        <span>Status</span>
                    </div>
                    <div class="stat-item">
                        <i data-lucide="zap"></i>
                        <strong>Alpha</strong>
                        <span>Acesso</span>
                    </div>
                    <div class="stat-item">
                        <i data-lucide="calendar"></i>
                        <strong id="creationDate">--/--</strong>
                        <span>Desde</span>
                    </div>
                </div>
            </div>

            <div class="profile-actions" style="padding: 20px 24px;">
                <button class="cta-button" onclick="window.location.href='editarperfil.html'">
                    <i data-lucide="settings"></i>
                    <span>Configurar Perfil</span>
                </button>
                
                <button class="cta-button" onclick="window.location.href='logout.html'" 
                        style="background: none; border: 1px solid var(--danger); color: var(--danger); margin-top: 10px; box-shadow: none;">
                    <i data-lucide="log-out"></i>
                    <span>Sair da Rede</span>
                </button>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function loadProfile() {
            const data = JSON.parse(localStorage.getItem("profile"));

            if (!data) {
                window.location.href = 'index.html';
                return;
            }

            // Preenchimento de dados
            document.getElementById('profileName').textContent = data.name;
            document.getElementById('displayHubID').textContent = data.hubID || "HUB_ERROR";
            document.getElementById('profileHandle').textContent = `@${data.handle || 'user'}`;
            document.getElementById('profileBio').textContent = data.bio || "Membro oficial do HUB Alpha.";
            document.getElementById('profileImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue";
            document.getElementById('creationDate').textContent = data.created.split('/')[0] + '/' + data.created.split('/')[2].slice(-2);
            
            if(data.banner) {
                document.getElementById('profileBanner').style.backgroundImage = `url(${data.banner})`;
            }
        }

        function copyID() {
            const id = document.getElementById('displayHubID').textContent;
            navigator.clipboard.writeText(id).then(() => {
                const chip = document.querySelector('.copy-chip');
                chip.innerHTML = '<i data-lucide="check"></i> Copiado!';
                chip.style.color = "var(--success)";
                lucide.createIcons();
                setTimeout(() => {
                    chip.innerHTML = '<i data-lucide="copy"></i> Copiar ID';
                    chip.style.color = "var(--text-dim)";
                    lucide.createIcons();
                }, 2000);
            });
        }

        loadProfile();
    </script>
</body>
</html>
