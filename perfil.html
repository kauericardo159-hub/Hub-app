<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | HTML HUB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Ajustes para o ID Numérico Padrão */
        .id-badge-classic {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            margin: 15px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .id-badge-classic i { width: 16px; color: var(--primary); }
        
        .id-badge-classic span {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
            font-size: 0.95rem;
        }

        .id-badge-classic:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: scale(1.02);
        }

        /* Grid de Informações Clássica */
        .info-total-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .info-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: var(--radius-lg);
            text-align: left;
        }

        .info-box i { color: var(--primary); margin-bottom: 10px; }
        .info-box strong { display: block; font-size: 0.8rem; color: white; }
        .info-box span { font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="profile-layout fade-in">
        
        <div class="glass-card profile-main-card">
            <div class="banner-wrapper">
                <div id="profileBanner" class="banner-img"></div>
                <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));"></div>
            </div>

            <div class="avatar-container" style="margin-top: -55px; position: relative; z-index: 5;">
                <div class="avatar-ring online">
                    <img id="profileImg" src="" alt="Avatar">
                </div>
            </div>

            <div class="user-meta" style="padding-top: 10px;">
                <h2 id="profileName" style="font-size: 1.7rem; font-weight: 800;">Carregando...</h2>
                <span id="profileHandle" style="color: var(--primary); font-weight: 600;">@usuario</span>

                <center>
                    <div class="id-badge-classic" onclick="copyID()">
                        <i data-lucide="hash"></i>
                        <span id="displayHubID">HUB_00000000</span>
                    </div>
                </center>

                <p id="profileBio" style="margin: 15px 0; font-size: 0.9rem; color: var(--text-dim);">
                    Buscando biografia...
                </p>

                <div class="info-total-container">
                    <div class="info-box">
                        <i data-lucide="calendar"></i>
                        <strong>Criação</strong>
                        <span id="creationDate">--/--/----</span>
                    </div>
                    <div class="info-box">
                        <i data-lucide="check-circle"></i>
                        <strong>Status</strong>
                        <span>Verificado</span>
                    </div>
                </div>
            </div>

            <div style="padding: 20px;">
                <button class="cta-button" onclick="window.location.href='editarperfil.html'">
                    <i data-lucide="edit-3"></i>
                    <span>Editar Perfil</span>
                </button>
            </div>
        </div>

        <button class="logout-minimal-btn" onclick="window.location.href='logout.html'" style="margin-top: 20px; color: var(--danger); opacity: 0.8; background: none; border: none; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700;">
            <i data-lucide="log-out"></i> Sair do Sistema
        </button>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function loadProfile() {
            const data = JSON.parse(localStorage.getItem("profile"));
            if (!data) { window.location.href = 'index.html'; return; }

            document.getElementById('profileName').textContent = data.name;
            document.getElementById('displayHubID').textContent = data.hubID || "HUB_00000000";
            document.getElementById('profileHandle').textContent = `@${data.handle || 'user'}`;
            document.getElementById('profileBio').textContent = data.bio || "Membro oficial do HUB.";
            document.getElementById('profileImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue";
            document.getElementById('creationDate').textContent = data.created;
            
            if(data.banner) {
                document.getElementById('profileBanner').style.backgroundImage = `url(${data.banner})`;
            }
        }

        function copyID() {
            const id = document.getElementById('displayHubID').textContent;
            navigator.clipboard.writeText(id);
            alert("ID HUB Copiado com sucesso!");
        }

        loadProfile();
    </script>
</body>
</html>
