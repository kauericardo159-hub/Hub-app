<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | HTML Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Ajustes específicos para a página de perfil */
        body { display: block; overflow-y: auto; padding-bottom: 100px; }
        .app { max-width: 480px; margin: 20px auto; display: flex; flex-direction: column; gap: 16px; padding: 0 15px; }
        
        .profile { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 26px; overflow: hidden; position: relative; }
        .profile-banner { height: 145px; background: linear-gradient(135deg, #2b3170, var(--primary)); background-size: cover; }
        
        .avatar { width: 82px; height: 82px; border-radius: 22px; overflow: hidden; border: 4px solid var(--bg-dark); position: absolute; left: 16px; top: 78px; background: #000; }
        .avatar.online { border-color: #4cff8f; }
        .avatar.offline { border-color: #ff5c5c; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profile-content { padding: 22px 16px 14px 116px; }
        .profile-name { font-size: 1.35em; font-weight: 800; color: white; }
        .profile-status { font-size: .8em; font-weight: 600; }
        .profile-status.online { color: #4cff8f; }
        .profile-status.offline { color: #ff5c5c; }
        .profile-bio { margin-top: 5px; font-size: .9em; color: var(--text-dim); }

        .section { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 22px; padding: 16px; }
        .html-item { background: rgba(0,0,0,0.3); border-radius: 18px; overflow: hidden; margin-top: 14px; border: 1px solid var(--glass-border); }
        .html-cover { height: 100px; background: #000 center/cover no-repeat; }
        .html-body { padding: 14px; }
        .html-actions { display: flex; gap: 6px; margin-top: 12px; }
        .html-actions button { flex: 1; border: none; border-radius: 8px; padding: 8px; font-size: .8em; font-weight: 600; color: #fff; cursor: pointer; }
        
        .open { background: var(--primary); }
        .edit { background: #6f5cff; }
        .del { background: #ff5c5c; }

        /* Estilo dos Modais */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal.show { display: flex; }
        .modal-box { width: 100%; max-width: 400px; background: #1e293b; border-radius: 24px; padding: 25px; border: 1px solid var(--glass-border); }
        
        .btn { padding: 12px; border: none; border-radius: 14px; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn.alt { background: rgba(255,255,255,0.1); color: white; margin-bottom: 10px; }
    </style>
</head>

<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <div class="app">
        <div class="profile">
            <div class="profile-banner" id="profileBanner"></div>
            <div class="avatar" id="avatar">
                <img id="profileImg" src="">
            </div>
            <div class="profile-content">
                <div class="profile-name" id="profileName">Carregando...</div>
                <div class="profile-status" id="statusText">Offline</div>
                <div class="profile-bio" id="profileBio">...</div>
            </div>
        </div>

        <div class="top-actions">
            <button class="btn alt" onclick="openProfile()">Editar Perfil</button>
        </div>

        <div class="section">
            <h3 style="color: white; font-size: 1rem;"><i data-lucide="code" style="width:16px; vertical-align:middle"></i> Meus Projetos HTML</h3>
            <div id="htmlList"></div>
            <button class="btn" onclick="openHtml()" style="margin-top:15px">＋ Novo HTML</button>
        </div>

        <div style="text-align: center; color: var(--text-dim); font-size: 0.7rem; margin-top: 10px;">
            HTML Hub • v3.8 • Beta
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <div class="modal" id="profileModal">
        <div class="modal-box">
            <h3 style="color:white; margin-bottom:15px">Editar Perfil</h3>
            <input id="nameInput" placeholder="Nome">
            <textarea id="bioInput" placeholder="Sua Bio"></textarea>
            <label style="font-size:0.7rem; color:var(--text-dim)">Foto de Perfil:</label>
            <input type="file" id="imgInput" style="padding:5px">
            <label style="font-size:0.7rem; color:var(--text-dim)">Banner:</label>
            <input type="file" id="bannerInput" style="padding:5px">
            <button class="btn" onclick="saveProfile()">Salvar Alterações</button>
        </div>
    </div>

    <div class="modal" id="htmlModal">
        <div class="modal-box">
            <h3 style="color:white; margin-bottom:15px">Novo Código HTML</h3>
            <input id="htmlName" placeholder="Nome do Projeto">
            <textarea id="htmlCode" placeholder="Cole seu código aqui..."></textarea>
            <label style="font-size:0.7rem; color:var(--text-dim)">Capa do Projeto:</label>
            <input type="file" id="htmlCoverInput">
            <button class="btn" onclick="saveHtml()">Salvar Projeto</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        /* ===== STATUS ONLINE/OFFLINE ===== */
        function updateStatus() {
            const online = navigator.onLine;
            const statusEl = document.getElementById('statusText');
            const avatarEl = document.getElementById('avatar');
            statusEl.textContent = online ? "Online" : "Offline";
            statusEl.className = "profile-status " + (online ? "online" : "offline");
            avatarEl.className = "avatar " + (online ? "online" : "offline");
        }
        window.addEventListener("online", updateStatus);
        window.addEventListener("offline", updateStatus);

        /* ===== LOGICA DE PERFIL ===== */
        let profile = JSON.parse(localStorage.getItem("profile")) || {
            name: "Usuário",
            bio: "Clique em editar para mudar sua bio",
            img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue",
            banner: ""
        };

        function renderProfile() {
            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileBio').textContent = profile.bio;
            document.getElementById('profileImg').src = profile.img;
            const banner = document.getElementById('profileBanner');
            banner.style.backgroundImage = profile.banner ? `url(${profile.banner})` : "linear-gradient(135deg,#2b3170,#4f7cff)";
        }

        // Upload de Imagens
        document.getElementById('imgInput').onchange = e => {
            const r = new FileReader();
            r.onload = () => { profile.img = r.result; renderProfile(); };
            r.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('bannerInput').onchange = e => {
            const r = new FileReader();
            r.onload = () => { profile.banner = r.result; renderProfile(); };
            r.readAsDataURL(e.target.files[0]);
        };

        function openProfile() {
            document.getElementById('nameInput').value = profile.name;
            document.getElementById('bioInput').value = profile.bio;
            document.getElementById('profileModal').classList.add("show");
        }

        function saveProfile() {
            profile.name = document.getElementById('nameInput').value;
            profile.bio = document.getElementById('bioInput').value;
            localStorage.setItem("profile", JSON.stringify(profile));
            renderProfile();
            document.getElementById('profileModal').classList.remove("show");
        }

        /* ===== LOGICA DE HTMLs (CRUD) ===== */
        let htmls = JSON.parse(localStorage.getItem("htmls")) || [];
        let editingIndex = null;
        let coverTemp = "";

        document.getElementById('htmlCoverInput').onchange = e => {
            const r = new FileReader();
            r.onload = () => { coverTemp = r.result; };
            r.readAsDataURL(e.target.files[0]);
        };

        function renderHtmls() {
            const list = document.getElementById('htmlList');
            list.innerHTML = "";
            htmls.forEach((h, i) => {
                list.innerHTML += `
                <div class="html-item">
                    <div class="html-cover" style="background-image:url('${h.cover || ""}')"></div>
                    <div class="html-body">
                        <div class="html-name" style="color:white; font-weight:700">${h.name}</div>
                        <div class="html-meta" style="color:var(--text-dim); font-size:0.7rem">${h.updated}</div>
                        <div class="html-actions">
                            <button class="open" onclick="openFile(${i})">Abrir</button>
                            <button class="edit" onclick="editHtml(${i})">Editar</button>
                            <button class="del" onclick="delHtml(${i})">X</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function openHtml() {
            editingIndex = null;
            document.getElementById('htmlName').value = "";
            document.getElementById('htmlCode').value = "";
            coverTemp = "";
            document.getElementById('htmlModal').classList.add("show");
        }

        function saveHtml() {
            const now = new Date().toLocaleString();
            const name = document.getElementById('htmlName').value;
            const code = document.getElementById('htmlCode').value;
            
            if(editingIndex === null) {
                htmls.push({name, code, cover: coverTemp, updated: now});
            } else {
                htmls[editingIndex] = {name, code, cover: coverTemp || htmls[editingIndex].cover, updated: now};
            }
            
            localStorage.setItem("htmls", JSON.stringify(htmls));
            document.getElementById('htmlModal').classList.remove("show");
            renderHtmls();
        }

        function editHtml(i) {
            editingIndex = i;
            document.getElementById('htmlName').value = htmls[i].name;
            document.getElementById('htmlCode').value = htmls[i].code;
            document.getElementById('htmlModal').classList.add("show");
        }

        function delHtml(i) {
            if(confirm("Deseja realmente excluir este projeto?")) {
                htmls.splice(i, 1);
                localStorage.setItem("htmls", JSON.stringify(htmls));
                renderHtmls();
            }
        }

        function openFile(i) {
            const w = window.open();
            w.document.write(htmls[i].code);
            w.document.close();
        }

        // Fechar modais ao clicar fora
        window.onclick = e => {
            if (e.target.className === 'modal show') {
                document.getElementById('profileModal').classList.remove('show');
                document.getElementById('htmlModal').classList.remove('show');
            }
        };

        // Inicialização
        renderProfile();
        renderHtmls();
        updateStatus();
    </script>
</body>
</html>
