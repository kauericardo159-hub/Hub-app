<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Alpha | HTML HUB</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos de Elite - Perfil Owner */
        .profile-container {
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* Banner & Edit Button */
        .banner-elite {
            height: 180px;
            position: relative;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            border-radius: 0 0 30px 30px;
            overflow: hidden;
            border-bottom: 2px solid rgba(255, 120, 0, 0.3);
        }

        .edit-profile-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }
        .edit-profile-btn:hover { background: var(--primary); }

        /* Avatar com Borda Animada */
        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin-top: -55px;
            margin-left: 25px;
            z-index: 5;
        }

        .avatar-border-anim {
            position: absolute;
            inset: -4px;
            background: conic-gradient(from 0deg, transparent, #ff7800, transparent 40%);
            border-radius: 38px;
            animation: rotate-border 4s linear infinite;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        .avatar-main {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0f111a;
            border-radius: 35px;
            padding: 4px;
        }

        .avatar-main img {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            object-fit: cover;
        }

        /* Status Automático na Foto */
        .auto-status {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            background: #10b981;
            border: 3px solid #0f111a;
            border-radius: 50%;
            box-shadow: 0 0 15px #10b981;
        }

        /* Badge de Owner Laranja */
        .owner-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(90deg, #ff7800, #ffb347);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 120, 0, 0.4);
            animation: badge-glow 2s infinite alternate;
        }

        @keyframes badge-glow {
            from { filter: brightness(1); transform: scale(1); }
            to { filter: brightness(1.3); transform: scale(1.05); }
        }

        /* Meta Info */
        .info-card {
            padding: 20px 25px;
        }

        .id-label-classic {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 120, 0, 0.1);
            color: #ff7800;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 800;
            display: inline-block;
            margin: 15px 0;
            border: 1px solid rgba(255, 120, 0, 0.2);
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary" style="background: rgba(255, 120, 0, 0.15);"></div>
    </div>

    <main class="profile-container fade-in">
        
        <div class="banner-elite" id="profileBanner">
            <button class="edit-profile-btn" onclick="window.location.href='editarperfil.html'">
                <i data-lucide="edit-3"></i>
                Editar Perfil
            </button>
        </div>

        <div class="avatar-wrapper">
            <div class="avatar-border-anim"></div>
            <div class="avatar-main">
                <img id="profileImg" src="" alt="Avatar">
                <div class="auto-status"></div>
            </div>
        </div>

        <div class="info-card">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 5px;">
                <h1 id="profileName" style="font-size: 1.8rem; font-weight: 900;">Nome</h1>
                <div class="owner-badge">
                    <i data-lucide="crown" style="width: 12px;"></i>
                    Owner
                </div>
            </div>
            
            <span id="profileHandle" style="color: var(--text-dim); font-weight: 600;">@usuario</span>

            <div style="margin-top: 25px;">
                <div class="id-label-classic">
                    ID: <span id="displayHubID">HUB_VAROGHAA</span>
                </div>
                
                <div style="font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                    <i data-lucide="calendar" style="width: 16px;"></i>
                    Conta Criada: <strong id="creationDate" style="color: white;">--/--/----</strong>
                </div>
            </div>

            <p id="profileBio" style="margin-top: 20px; line-height: 1.6; color: rgba(255,255,255,0.7); font-size: 0.9rem;">
                Carregando informações do servidor Alpha...
            </p>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function loadProfileData() {
            const data = JSON.parse(localStorage.getItem("profile"));
            if (!data) { window.location.href = 'index.html'; return; }

            document.getElementById('profileName').textContent = data.name;
            document.getElementById('profileHandle').textContent = `@${data.handle || 'user'}`;
            document.getElementById('profileBio').textContent = data.bio || "Membro oficial do HUB.";
            document.getElementById('profileImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=Admin";
            document.getElementById('creationDate').textContent = data.created;
            
            // Força o ID para o Badge solicitado se for o seu usuário
            document.getElementById('displayHubID').textContent = "HUB_VAROGHAA";

            if(data.banner) {
                document.getElementById('profileBanner').style.backgroundImage = `url(${data.banner})`;
                document.getElementById('profileBanner').style.backgroundSize = 'cover';
                document.getElementById('profileBanner').style.backgroundPosition = 'center';
            }
        }

        loadProfileData();
    </script>
</body>
</html>
