<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil HUB | Identidade</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <header class="app-header">
        <span class="app-brand">PERFIL <span class="highlight">HUB</span></span>
    </header>

    <main class="profile-layout fade-in">
        
        <div class="glass-card profile-main-card">
            <div class="banner-wrapper">
                <div id="profileBanner" class="banner-img"></div>
                <div class="banner-overlay"></div>
            </div>

            <div class="avatar-container">
                <div class="avatar-ring" id="statusRing">
                    <img id="profileImg" src="" alt="Avatar">
                </div>
            </div>

            <div class="user-meta">
                <div class="name-status">
                    <h2 id="profileName">Carregando...</h2>
                    <span id="statusBadge" class="status-indicator">Online</span>
                </div>
                
                <div class="hub-id-display-box">
                    <div class="hub-id-content">
                        <span class="hub-tag">ID OFICIAL</span>
                        <span id="displayHubID" class="hub-number">HUB_00000000</span>
                    </div>
                    <button class="copy-id-btn" onclick="copyID()" title="Copiar ID">
                        <i data-lucide="copy"></i>
                    </button>
                </div>

                <span class="user-handle" id="profileHandle">@usuario</span>
                
                <div class="account-date">
                    <i data-lucide="calendar"></i>
                    <span>Membro desde <span id="creationDate">--/--/----</span></span>
                </div>

                <p class="user-bio" id="profileBio">A carregar biografia...</p>
            </div>

            <div class="profile-actions">
                <button class="cta-button edit-btn" onclick="window.location.href='editarperfil.html'">
                    <i data-lucide="settings-2"></i>
                    <span>Personalizar Perfil</span>
                </button>

                <button class="cta-button logout-btn-profile" onclick="window.location.href='logout.html'">
                    <i data-lucide="log-out"></i>
                    <span>Encerrar Sessão</span>
                </button>
            </div>
        </div>

        <div class="glass-card detail-card" style="margin-top: 15px;">
            <div class="info-row">
                <div class="info-box">
                    <i data-lucide="shield-check" style="color: var(--success); margin-bottom: 5px; width: 18px;"></i>
                    <strong>Ativo</strong>
                    <span>Status</span>
                </div>
                <div class="info-box">
                    <i data-lucide="database" style="color: var(--primary); margin-bottom: 5px; width: 18px;"></i>
                    <strong>Local</strong>
                    <span>Data</span>
                </div>
                <div class="info-box">
                    <i data-lucide="zap" style="color: #f59e0b; margin-bottom: 5px; width: 18px;"></i>
                    <strong>Pro</strong>
                    <span>Nível</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="home"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // Carrega os dados do utilizador do LocalStorage
        function loadProfileData() {
            const data = JSON.parse(localStorage.getItem("profile"));

            if (!data) {
                // Se não houver dados, redireciona para o login/index
                window.location.href = 'index.html';
                return;
            }

            // Preenchimento dos campos
            document.getElementById('profileName').textContent = data.name;
            document.getElementById('displayHubID').textContent = data.hubID || "HUB_ERROR";
            document.getElementById('profileHandle').textContent = `@${data.handle || 'usuario'}`;
            document.getElementById('profileBio').textContent = data.bio || "Olá! Eu sou um novo membro do HTML HUB.";
            document.getElementById('profileImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue";
            document.getElementById('creationDate').textContent = data.created || "20/12/2025";
            
            // Aplica o banner
            const banner = document.getElementById('profileBanner');
            banner.style.backgroundImage = data.banner ? `url(${data.banner})` : "linear-gradient(135deg,#2b3170,#4f7cff)";
        }

        // Função para copiar o ID
        function copyID() {
            const idText = document.getElementById('displayHubID').textContent;
            navigator.clipboard.writeText(idText).then(() => {
                alert("ID HUB copiado!");
            });
        }

        // Sistema de monitorização Online/Offline
        function updateStatusUI() {
            const isOnline = navigator.onLine;
            const badge = document.getElementById('statusBadge');
            const ring = document.getElementById('statusRing');
            
            badge.textContent = isOnline ? "Online" : "Offline";
            badge.className = `status-indicator ${isOnline ? 'online' : 'offline'}`;
            ring.className = `avatar-ring ${isOnline ? 'online' : 'offline'}`;
        }

        window.addEventListener('online', updateStatusUI);
        window.addEventListener('offline', updateStatusUI);

        // Inicia a página
        loadProfileData();
        updateStatusUI();
    </script>

    <style>
        /* Estilos exclusivos para os novos elementos do Perfil */
        .hub-id-display-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 14px;
            margin: 12px 0;
            max-width: 240px;
        }
        .hub-id-content { display: flex; flex-direction: column; }
        .hub-tag { font-size: 0.55rem; font-weight: 800; color: var(--text-dim); letter-spacing: 1px; }
        .hub-number { font-family: 'Courier New', Courier, monospace; color: var(--success); font-weight: 900; font-size: 1rem; }
        
        .copy-id-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; transition: 0.2s; padding: 5px; }
        .copy-id-btn:hover { color: var(--primary); transform: scale(1.1); }
        .copy-id-btn i { width: 18px; }

        .logout-btn-profile {
            margin-top: 10px;
            background: rgba(239, 68, 68, 0.1) !important;
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            color: #ef4444 !important;
        }
        .logout-btn-profile:hover {
            background: #ef4444 !important;
            color: white !important;
        }
    </style>
</body>
</html>
