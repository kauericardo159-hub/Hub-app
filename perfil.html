<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | HTML HUB</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <header class="app-header fade-in">
        <span class="app-brand">PERFIL <span class="highlight">HUB</span></span>
    </header>

    <main class="profile-layout">
        
        <div class="glass-card profile-main-card fade-in" style="animation-delay: 0.1s;">
            <div class="banner-wrapper">
                <div id="profileBanner" class="banner-img"></div>
                <div class="banner-overlay" style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg-dark));"></div>
            </div>

            <div class="avatar-container" style="margin-top: -55px; position: relative; z-index: 5; padding-left: 20px;">
                <div class="avatar-ring online" id="statusRing" style="width: 100px; height: 100px; background: var(--bg-dark); padding: 4px; border-radius: 30px; border: 2px solid var(--success);">
                    <img id="profileImg" src="" alt="Avatar" style="width: 100%; height: 100%; border-radius: 25px; object-fit: cover;">
                </div>
            </div>

            <div class="user-meta" style="padding: 20px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h2 id="profileName" style="font-size: 1.6rem; font-weight: 800;">Carregando...</h2>
                    <span class="status-indicator online" style="font-size: 0.6rem; background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 3px 10px; border-radius: 50px; font-weight: 900;">ONLINE</span>
                </div>
                
                <span id="profileHandle" style="color: var(--primary); font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 12px;">@usuario</span>

                <div class="hub-id-box" onclick="copyID()" style="display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--glass-border); cursor: pointer;">
                    <i data-lucide="fingerprint" style="width: 16px; color: var(--text-dim);"></i>
                    <span id="displayHubID" style="font-family: monospace; font-weight: 800; color: white; letter-spacing: 1px;">HUB_00000000</span>
                </div>

                <p id="profileBio" style="margin-top: 15px; color: var(--text-dim); font-size: 0.85rem; line-height: 1.6;">
                    Buscando biografia no sistema...
                </p>
            </div>

            <div style="padding: 0 20px 20px;">
                <button class="cta-button" onclick="window.location.href='editarperfil.html'" style="margin-bottom: 10px;">
                    <i data-lucide="edit-3"></i>
                    <span>Editar Perfil</span>
                </button>
                <button onclick="window.location.href='logout.html'" style="width: 100%; background: none; border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i data-lucide="log-out" style="width: 16px;"></i>
                    Sair da Conta
                </button>
            </div>
        </div>

        <div class="glass-card fade-in" style="margin-top: 15px; animation-delay: 0.2s; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px;">
            <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px; text-align: center;">
                <i data-lucide="calendar" style="width: 18px; color: var(--primary); margin-bottom: 5px;"></i>
                <span style="display: block; font-size: 0.6rem; color: var(--text-dim);">MEMBRO DESDE</span>
                <strong id="creationDate" style="font-size: 0.8rem;">--/--/----</strong>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px; text-align: center;">
                <i data-lucide="shield-check" style="width: 18px; color: var(--success); margin-bottom: 5px;"></i>
                <span style="display: block; font-size: 0.6rem; color: var(--text-dim);">STATUS ID</span>
                <strong style="font-size: 0.8rem; color: var(--success);">VERIFICADO</strong>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="home"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function loadProfile() {
            const data = JSON.parse(localStorage.getItem("profile"));
            if (!data) { window.location.href = 'index.html'; return; }

            document.getElementById('profileName').textContent = data.name;
            document.getElementById('displayHubID').textContent = data.hubID;
            document.getElementById('profileHandle').textContent = `@${data.handle || 'usuario'}`;
            document.getElementById('profileBio').textContent = data.bio || "Sem biografia.";
            document.getElementById('profileImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=User";
            document.getElementById('creationDate').textContent = data.created;
            
            if(data.banner) document.getElementById('profileBanner').style.backgroundImage = `url(${data.banner})`;
        }

        function copyID() {
            const id = document.getElementById('displayHubID').textContent;
            navigator.clipboard.writeText(id);
            alert("ID Copiado!");
        }

        loadProfile();
    </script>
</body>
</html>
