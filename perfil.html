<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | HTML HUB</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos Exclusivos Perfil Owner */
        .profile-page {
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* Banner & Edit */
        .premium-banner {
            height: 200px;
            background: linear-gradient(135deg, #1e1b4b, #09090b);
            position: relative;
            border-radius: 0 0 40px 40px;
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
        }

        .edit-float {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 18px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }
        .edit-float:hover { background: var(--primary); transform: translateY(-2px); }

        /* Avatar System */
        .avatar-section {
            position: relative;
            width: 120px;
            height: 120px;
            margin-top: -60px;
            margin-left: 25px;
            z-index: 5;
        }

        .avatar-glow-ring {
            position: absolute;
            inset: -3px;
            background: conic-gradient(from 0deg, transparent, var(--primary), transparent 60%);
            border-radius: 42px;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .avatar-frame {
            position: relative;
            width: 100%;
            height: 100%;
            background: #09090b;
            border-radius: 40px;
            padding: 5px;
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            object-fit: cover;
        }

        .online-status {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: #10b981;
            border: 4px solid #09090b;
            border-radius: 50%;
            box-shadow: 0 0 15px #10b981;
        }

        /* Badge Owner Laranja */
        .badge-owner {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 5px 14px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.4);
            animation: owner-pulse 2s infinite alternate;
        }

        @keyframes owner-pulse {
            from { filter: drop-shadow(0 0 2px #f59e0b); }
            to { filter: drop-shadow(0 0 10px #f59e0b); }
        }

        /* Identity Details */
        .id-chip {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 800;
            font-size: 0.9rem;
            display: inline-block;
            margin: 20px 0;
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="profile-page fade-in">
        
        <div class="premium-banner" id="userBanner">
            <button class="edit-float" onclick="window.location.href='editarperfil.html'">
                <i data-lucide="pencil"></i>
                Editar Perfil
            </button>
        </div>

        <div class="avatar-section">
            <div class="avatar-glow-ring"></div>
            <div class="avatar-frame">
                <img id="displayImg" src="" alt="User Avatar">
                <div class="online-status"></div>
            </div>
        </div>

        <div style="padding: 25px;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 5px;">
                <h1 id="displayName" style="font-size: 1.8rem; font-weight: 900;">Nome</h1>
                <div class="badge-owner">
                    <i data-lucide="crown" style="width: 14px;"></i>
                    Owner
                </div>
            </div>

            <p id="displayHandle" style="color: var(--text-dim); font-weight: 600; font-size: 1rem;">@usuario</p>

            <div class="id-chip">
                ID: HUB_VAROGHAA
            </div>

            <div style="display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 25px;">
                <i data-lucide="calendar" style="width: 16px;"></i>
                Conta Ativada em: <strong id="displayDate" style="color: white;">--/--/----</strong>
            </div>

            <div class="glass-card" style="padding: 20px; border-radius: 20px;">
                <h4 style="font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Biografia Alpha</h4>
                <p id="displayBio" style="font-size: 0.9rem; line-height: 1.6; color: rgba(255,255,255,0.8);">
                    Sincronizando dados com o servidor central...
                </p>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Painel</span>
        </button>
        <button class="nav-item active">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function loadProfile() {
            const data = JSON.parse(localStorage.getItem("profile"));
            
            if (!data) {
                window.location.href = 'index.html';
                return;
            }

            // Preenchimento de Dados
            document.getElementById('displayName').textContent = data.name;
            document.getElementById('displayHandle').textContent = `@${data.handle || 'user'}`;
            document.getElementById('displayBio').textContent = data.bio || "Este membro ainda não definiu uma biografia oficial na rede HUB.";
            document.getElementById('displayImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=Admin";
            document.getElementById('displayDate').textContent = data.created;

            // Banner Customizado
            if(data.banner) {
                const banner = document.getElementById('userBanner');
                banner.style.backgroundImage = `url(${data.banner})`;
                banner.style.backgroundSize = 'cover';
                banner.style.backgroundPosition = 'center';
            }
        }

        loadProfile();
    </script>
</body>
</html>
