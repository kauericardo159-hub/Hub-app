<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Hub Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos Exclusivos da Página de Perfil */
        body { display: block; overflow-y: auto; padding-bottom: 110px; }
        
        .profile-wrapper {
            max-width: 500px;
            margin: 0 auto;
            perspective: 1000px;
        }

        /* HEADER DO PERFIL (Banner + Avatar) */
        .profile-header {
            position: relative;
            background: var(--glass-bg);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        .banner-container {
            height: 160px;
            background: linear-gradient(45deg, var(--primary), #a855f7);
            background-size: cover;
            background-position: center;
            transition: 0.5s;
        }

        .avatar-container {
            position: absolute;
            left: 20px;
            top: 110px;
            z-index: 2;
        }

        .avatar-main {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            border: 5px solid var(--bg-dark);
            background: #000;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .info-section {
            padding: 60px 20px 25px;
            text-align: left;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }
        .status-dot.offline { background: #64748b; box-shadow: none; }

        .username-handle {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
            margin-bottom: 8px;
        }

        .creation-date {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 12px;
        }

        /* CARD DE BIO */
        .bio-card {
            margin-top: 20px;
            padding: 20px !important;
            animation: slideUp 0.8s ease-out;
        }

        /* BOTÃO EDITAR */
        .edit-trigger {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .edit-trigger:hover { background: var(--primary); border-color: var(--primary); }

        /* MODAL DE EDIÇÃO MELHORADO */
        .edit-form-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .file-input-label {
            display: block;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border: 1px dashed var(--text-dim);
            border-radius: 10px;
            text-align: center;
            font-size: 0.8rem;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <div class="app profile-wrapper">
        <header style="text-align: center; margin-bottom: 25px;">
            <h2 style="font-weight: 900; letter-spacing: 1px; color: white;">HUB PROFILE</h2>
        </header>

        <div class="profile-header">
            <div class="banner-container" id="viewBanner"></div>
            
            <div class="avatar-container">
                <img id="viewAvatar" class="avatar-main" src="">
            </div>

            <div class="info-section">
                <div class="name-row">
                    <h1 id="viewName">Carregando...</h1>
                    <div id="viewStatus" class="status-dot"></div>
                </div>
                <span class="username-handle" id="viewHandle">@usuario</span>
                
                <div id="viewBio" style="font-size: 0.9rem; color: var(--text-dim); margin-top: 10px;">
                    Sua bio aparecerá aqui...
                </div>

                <div class="creation-date">
                    <i data-lucide="calendar" size="14"></i>
                    Criado em: <span id="viewDate">01/01/2025</span>
                </div>

                <button class="edit-trigger" onclick="openEditModal()">
                    <i data-lucide="edit-3" size="18"></i>
                    Editar Perfil
                </button>
            </div>
        </div>

        <div class="glass-card bio-card" style="display: flex; justify-content: space-around; text-align: center;">
            <div>
                <h4 style="color:white">12</h4>
                <p style="font-size:0.7rem">PROJETOS</p>
            </div>
            <div style="width: 1px; background: var(--glass-border);"></div>
            <div>
                <h4 style="color:white">PRO</h4>
                <p style="font-size:0.7rem">PLANO</p>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="color:white">Personalizar Perfil</h3>
                <i data-lucide="x" style="cursor:pointer" onclick="closeModal()"></i>
            </div>
            
            <div class="edit-form-grid">
                <div class="input-field">
                    <label>Nome de Exibição</label>
                    <input type="text" id="inputName">
                </div>

                <div class="input-field">
                    <label>Bio (Frase curta)</label>
                    <textarea id="inputBio" style="min-height: 80px;"></textarea>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <label class="file-input-label">
                        <i data-lucide="image" size="16"></i> Foto
                        <input type="file" id="inputAvatar" hidden accept="image/*">
                    </label>
                    <label class="file-input-label">
                        <i data-lucide="layout" size="16"></i> Banner
                        <input type="file" id="inputBanner" hidden accept="image/*">
                    </label>
                </div>

                <button class="cta-button" onclick="saveChanges()">
                    Salvar Tudo
                </button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        // Carregar dados ou definir padrão
        let userData = JSON.parse(localStorage.getItem('userData')) || {
            name: "Seu Nome",
            handle: "@" + (localStorage.getItem('lastUser') || "usuario"),
            bio: "Entusiasta de tecnologia e design.",
            avatar: "https://api.dicebear.com/7.x/shapes/svg?seed=Kaue",
            banner: "",
            created: new Date().toLocaleDateString('pt-BR')
        };

        function updateUI() {
            document.getElementById('viewName').textContent = userData.name;
            document.getElementById('viewHandle').textContent = userData.handle;
            document.getElementById('viewBio').textContent = userData.bio;
            document.getElementById('viewAvatar').src = userData.avatar;
            document.getElementById('viewDate').textContent = userData.created;
            
            const banner = document.getElementById('viewBanner');
            banner.style.backgroundImage = userData.banner ? `url(${userData.banner})` : "";
            
            // Status Online Simulado
            const dot = document.getElementById('viewStatus');
            dot.className = navigator.onLine ? "status-dot" : "status-dot offline";
        }

        function openEditModal() {
            document.getElementById('inputName').value = userData.name;
            document.getElementById('inputBio').value = userData.bio;
            document.getElementById('editModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        // Processar Imagens
        function handleImage(inputId, dataKey) {
            document.getElementById(inputId).onchange = e => {
                const reader = new FileReader();
                reader.onload = () => {
                    userData[dataKey] = reader.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            };
        }

        handleImage('inputAvatar', 'avatar');
        handleImage('inputBanner', 'banner');

        function saveChanges() {
            userData.name = document.getElementById('inputName').value;
            userData.bio = document.getElementById('inputBio').value;
            localStorage.setItem('userData', JSON.stringify(userData));
            updateUI();
            closeModal();
            
            // Feedback visual
            const btn = document.querySelector('.edit-trigger');
            btn.innerHTML = "Perfil Atualizado!";
            setTimeout(() => { 
                btn.innerHTML = `<i data-lucide="edit-3" size="18"></i> Editar Perfil`;
                lucide.createIcons();
            }, 2000);
        }

        // Inicializar
        updateUI();
        window.addEventListener('online', updateUI);
        window.addEventListener('offline', updateUI);
    </script>
</body>
</html>
