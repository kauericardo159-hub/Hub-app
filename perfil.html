<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil HUB | Identidade</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos específicos para as métricas sociais */
        .social-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .stat-item:hover { transform: translateY(-3px); }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
        }

        .stat-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .hub-id-display-box {
            margin: 15px auto !important;
        }

        /* Botão de Logout com Estilo Reduzido para não poluir */
        .logout-mini {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <button class="logout-mini" onclick="window.location.href='logout.html'" title="Sair">
        <i data-lucide="log-out" style="width: 18px;"></i>
    </button>

    <header class="app-header">
        <span class="app-brand">PERFIL <span class="highlight">HUB</span></span>
    </header>

    <main class="profile-layout fade-in">
        
        <div class="glass-card profile-main-card">
            <div class="banner-wrapper">
                <div id="profileBanner" class="banner-img"></div>
                <div class="banner-overlay"></div>
            </div>

            <div class="avatar-container">
                <div class="avatar-ring" id="statusRing">
                    <img id="profileImg" src="" alt="Avatar">
                </div>
            </div>

            <div class="user-meta">
                <div class="name-status">
                    <h2 id="profileName">Carregando...</h2>
                    <span id="statusBadge" class="status-indicator">Online</span>
                </div>

                <span class="user-handle" id="profileHandle">@usuario</span>

                <div class="social-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="count-following">124</span>
                        <span class="stat-label">Seguindo</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-followers">8.5k</span>
                        <span class="stat-label">Seguidores</span>
                    </div>
                </div>

                <div class="hub-id-display-box">
                    <div class="hub-id-content">
                        <span class="hub-tag">ID OFICIAL</span>
                        <span id="displayHubID" class="hub-number">HUB_00000000</span>
                    </div>
                    <button class="copy-id-btn" onclick="copyID()">
                        <i data-lucide="copy"></i>
                    </button>
                </div>
                
                <p class="user-bio" id="profileBio">A carregar biografia...</p>

                <div class="account-date" style="justify-content: center; margin-top: 15px;">
                    <i data-lucide="calendar" style="width: 14px;"></i>
                    <span style="font-size: 0.75rem;">Membro desde <span id="creationDate">--/--/----</span></span>
                </div>
            </div>

            <div class="profile-actions" style="padding: 0 24px 24px;">
                <button class="cta-button" onclick="window.location.href='editarperfil.html'">
                    <i data-lucide="settings-2"></i>
                    <span>Editar Perfil</span>
                </button>
            </div>
        </div>

        <div class="glass-card detail-card" style="margin-top: 15px; padding: 20px !important;">
            <div class="info-row">
                <div class="info-box">
                    <i data-lucide="award" style="color: #f59e0b; margin-bottom: 5px;"></i>
                    <strong>Pioneer</strong>
                    <span>Badge</span>
                </div>
                <div class="info-box">
                    <i data-lucide="check-circle" style="color: var(--success); margin-bottom: 5px;"></i>
                    <strong>Ativo</strong>
                    <span>Conta</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="home"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function loadProfileData() {
            const data = JSON.parse(localStorage.getItem("profile"));

            if (!data) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('profileName').textContent = data.name;
            document.getElementById('displayHubID').textContent = data.hubID || "HUB_ERROR";
            document.getElementById('profileHandle').textContent = `@${data.handle || 'usuario'}`;
            document.getElementById('profileBio').textContent = data.bio || "Explorando o ecossistema HTML HUB.";
            document.getElementById('profileImg').src = data.img || "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue";
            document.getElementById('creationDate').textContent = data.created || "20/12/2025";
            
            // Gerar números aleatórios para seguidores se não existirem (simulação)
            document.getElementById('count-following').textContent = data.following || Math.floor(Math.random() * 500) + 50;
            document.getElementById('count-followers').textContent = data.followers || (Math.random() * 10).toFixed(1) + "k";

            const banner = document.getElementById('profileBanner');
            banner.style.backgroundImage = data.banner ? `url(${data.banner})` : "linear-gradient(135deg,#2b3170,#4f7cff)";
        }

        function copyID() {
            const idText = document.getElementById('displayHubID').textContent;
            navigator.clipboard.writeText(idText);
            alert("ID HUB copiado com sucesso!");
        }

        loadProfileData();
    </script>
</body>
</html>
