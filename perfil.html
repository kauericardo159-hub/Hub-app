<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | HTML HUB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos específicos para o novo Perfil */
        body { display: block; overflow-y: auto; padding-bottom: 110px; }
        
        .profile-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        /* HEADER DO SITE */
        .app-header {
            padding: 20px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* CARD DE PERFIL */
        .profile-card-main {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .banner-wrapper {
            height: 160px;
            background: linear-gradient(135deg, #1e293b, #4f46e5);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .avatar-container {
            position: relative;
            margin-top: -50px;
            padding: 0 25px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        .avatar-frame {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            border: 5px solid var(--bg-dark);
            background: #000;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        .status-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid #000;
        }
        .status-badge.online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-badge.offline { background: #64748b; }

        /* INFO TEXT */
        .profile-info-box {
            padding: 20px 25px;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .full-name { font-size: 1.5rem; font-weight: 800; color: #fff; }
        .status-tag { 
            font-size: 0.65rem; 
            padding: 2px 8px; 
            border-radius: 20px; 
            background: rgba(255,255,255,0.1);
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
        }

        .username-handle { color: var(--primary); font-weight: 600; font-size: 0.9rem; display: block; }
        
        .creation-date { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-size: 0.75rem; 
            color: var(--text-dim); 
            margin-top: 12px;
        }

        .bio-text {
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        /* BOTÃO EDITAR */
        .edit-trigger {
            margin: 20px 25px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            width: calc(100% - 50px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }
        .edit-trigger:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* MODAL MELHORADO */
        .modal-content-plus {
            background: #1e293b;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .input-group-edit { margin-bottom: 15px; }
        .input-group-edit label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalPop { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <header class="app-header">HTML HUB</header>

    <div class="profile-container">
        <div class="profile-card-main">
            <div class="banner-wrapper" id="viewBanner"></div>

            <div class="avatar-container">
                <div class="avatar-frame">
                    <img id="viewImg" src="">
                    <div id="statusIndicator" class="status-badge online"></div>
                </div>
            </div>

            <div class="profile-info-box">
                <div class="name-row">
                    <span class="full-name" id="viewName">Nome de Usuário</span>
                    <span class="status-tag" id="viewStatusText">Online</span>
                </div>
                <span class="username-handle" id="viewHandle">@usuario</span>
                
                <div class="bio-text" id="viewBio">Sua bio aparecerá aqui. Conte um pouco sobre você.</div>

                <div class="creation-date">
                    <i data-lucide="calendar" size="14"></i>
                    <span>Conta criada em: </span>
                    <strong id="viewDate">20 de Dezembro, 2025</strong>
                </div>
            </div>

            <button class="edit-trigger" onclick="openEditModal()">
                <i data-lucide="edit-3" size="18"></i>
                Editar Perfil
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <div class="modal" id="editModal">
        <div class="modal-content-plus">
            <h2 style="margin-bottom: 20px;">Editar Perfil</h2>
            
            <div class="input-group-edit">
                <label>Nome Exibido</label>
                <input type="text" id="editName" placeholder="Seu nome">
            </div>

            <div class="input-group-edit">
                <label>Sua Bio</label>
                <textarea id="editBio" placeholder="Escreva sobre você..."></textarea>
            </div>

            <div class="input-group-edit">
                <label>Foto de Perfil</label>
                <input type="file" id="inputImg" accept="image/*">
            </div>

            <div class="input-group-edit">
                <label>Imagem do Banner</label>
                <input type="file" id="inputBanner" accept="image/*">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn alt" style="flex:1" onclick="closeModal()">Cancelar</button>
                <button class="btn" style="flex:2" onclick="saveData()">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Dados Iniciais ou LocalStorage
        let userData = JSON.parse(localStorage.getItem("userProfile")) || {
            name: "Kauê Machado",
            handle: "@kaue_dev",
            bio: "Apaixonado por tecnologia e design minimalista.",
            img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue",
            banner: "",
            created: "20 de Dezembro, 2025"
        };

        function render() {
            document.getElementById('viewName').textContent = userData.name;
            document.getElementById('viewBio').textContent = userData.bio;
            document.getElementById('viewHandle').textContent = `@${userData.name.toLowerCase().replace(/\s/g, '_')}`;
            document.getElementById('viewImg').src = userData.img;
            document.getElementById('viewDate').textContent = userData.created;
            
            const banner = document.getElementById('viewBanner');
            banner.style.backgroundImage = userData.banner ? `url(${userData.banner})` : "linear-gradient(135deg, #1e293b, #4f46e5)";
        }

        // Funções de Modal
        function openEditModal() {
            document.getElementById('editName').value = userData.name;
            document.getElementById('editBio').value = userData.bio;
            document.getElementById('editModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        function saveData() {
            userData.name = document.getElementById('editName').value;
            userData.bio = document.getElementById('editBio').value;
            localStorage.setItem("userProfile", JSON.stringify(userData));
            render();
            closeModal();
            lucide.createIcons();
        }

        // Leitura de Imagens
        document.getElementById('inputImg').onchange = e => {
            const r = new FileReader();
            r.onload = () => { userData.img = r.result; };
            r.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('inputBanner').onchange = e => {
            const r = new FileReader();
            r.onload = () => { userData.banner = r.result; };
            r.readAsDataURL(e.target.files[0]);
        };

        // Status em tempo real
        function checkStatus() {
            const isOnline = navigator.onLine;
            const dot = document.getElementById('statusIndicator');
            const txt = document.getElementById('viewStatusText');
            
            dot.className = `status-badge ${isOnline ? 'online' : 'offline'}`;
            txt.textContent = isOnline ? "Online" : "Offline";
            txt.style.color = isOnline ? "#10b981" : "#64748b";
        }

        window.addEventListener('online', checkStatus);
        window.addEventListener('offline', checkStatus);

        // Início
        render();
        checkStatus();
    </script>
</body>
</html>
