<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | HTML Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <header class="app-header">
        <span class="app-brand">HTML <span class="highlight">HUB</span></span>
    </header>

    <main class="profile-layout">
        
        <div class="glass-card profile-main-card fade-in">
            <div class="banner-wrapper">
                <div id="profileBanner" class="banner-img"></div>
                <div class="banner-overlay"></div>
            </div>

            <div class="avatar-container">
                <div class="avatar-ring" id="statusRing">
                    <img id="profileImg" src="" alt="Avatar">
                </div>
            </div>

            <div class="user-meta">
                <div class="name-status">
                    <h2 id="profileName">Carregando...</h2>
                    <span id="statusBadge" class="status-indicator">Offline</span>
                </div>
                <span class="user-handle" id="profileHandle">@usuario</span>
                
                <div class="account-date">
                    <i data-lucide="calendar"></i>
                    <span>Desde <span id="creationDate">--/--/----</span></span>
                </div>

                <p class="user-bio" id="profileBio">...</p>
            </div>

            <div class="profile-actions">
                <button class="cta-button edit-btn" onclick="window.location.href='editarperfil.html'">
                    <i data-lucide="edit-3"></i>
                    <span>Editar Perfil</span>
                </button>
            </div>
        </div>

        <div class="glass-card detail-card fade-in" style="animation-delay: 0.2s;">
            <div class="info-row">
                <div class="info-box">
                    <strong>0</strong>
                    <span>Projetos</span>
                </div>
                <div class="info-box">
                    <strong>PRO</strong>
                    <span>Plano</span>
                </div>
                <div class="info-box">
                    <strong>100%</strong>
                    <span>Confiável</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item active" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        // Carregar dados salvos
        function loadProfile() {
            const data = JSON.parse(localStorage.getItem("profile")) || {
                name: "Kauê Machado",
                handle: "kaue_hub",
                bio: "Apaixonado por tecnologia e design minimalista.",
                img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kaue",
                banner: "",
                created: "20/12/2025"
            };

            document.getElementById('profileName').textContent = data.name;
            document.getElementById('profileHandle').textContent = `@${data.handle || 'usuario'}`;
            document.getElementById('profileBio').textContent = data.bio;
            document.getElementById('profileImg').src = data.img;
            document.getElementById('creationDate').textContent = data.created;
            
            const banner = document.getElementById('profileBanner');
            banner.style.backgroundImage = data.banner ? `url(${data.banner})` : "linear-gradient(135deg,#2b3170,#4f7cff)";
        }

        // Status Online Simulado
        function updateOnlineStatus() {
            const online = navigator.onLine;
            const badge = document.getElementById('statusBadge');
            const ring = document.getElementById('statusRing');
            
            badge.textContent = online ? "Online" : "Offline";
            badge.className = `status-indicator ${online ? 'online' : 'offline'}`;
            ring.className = `avatar-ring ${online ? 'online' : 'offline'}`;
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        loadProfile();
        updateOnlineStatus();
    </script>
</body>
</html>
