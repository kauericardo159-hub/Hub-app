<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Premium | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="login-container">
        <div class="glass-card" id="auth-card">
            
            <div id="login-screen">
                <div class="card-header">
                    <div class="brand-logo"><i data-lucide="zap"></i></div>
                    <h1>Bem-vindo</h1>
                    <p>Acesse sua conta para ir ao Dashboard.</p>
                </div>

                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-field">
                        <label>Usuário</label>
                        <div class="field-container">
                            <i data-lucide="user" class="field-icon"></i>
                            <input type="text" id="login-user" placeholder="Digite admin" required>
                        </div>
                    </div>

                    <div class="input-field">
                        <label>Senha</label>
                        <div class="field-container">
                            <i data-lucide="lock" class="field-icon"></i>
                            <input type="password" id="login-pass" placeholder="Digite 1234" required>
                        </div>
                    </div>

                    <button type="submit" class="cta-button" id="btn-login">
                        <span>Entrar no Sistema</span>
                        <i data-lucide="log-in"></i>
                    </button>
                </form>

                <div class="card-footer">
                    <p class="signup-text">Não tem conta? <a href="javascript:void(0)" onclick="switchScreen('register')">Criar conta</a></p>
                </div>
            </div>

            <div id="register-screen" style="display: none;">
                <div class="card-header">
                    <div class="brand-logo" style="background: var(--success);"><i data-lucide="user-plus"></i></div>
                    <h1>Criar Conta</h1>
                    <p>Preencha os dados para se cadastrar.</p>
                </div>

                <form onsubmit="handleAuth(event, 'register')">
                    <div class="input-field">
                        <label>Novo Usuário</label>
                        <div class="field-container">
                            <i data-lucide="at-sign" class="field-icon"></i>
                            <input type="text" placeholder="Ex: kaue_pro" required>
                        </div>
                    </div>

                    <div class="input-field">
                        <label>Senha</label>
                        <div class="field-container">
                            <i data-lucide="shield-check" class="field-icon"></i>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="cta-button" style="background: var(--success);">
                        <span>Finalizar Cadastro</span>
                        <i data-lucide="check"></i>
                    </button>
                </form>

                <div class="card-footer">
                    <p class="signup-text">Já é membro? <a href="javascript:void(0)" onclick="switchScreen('login')">Fazer Login</a></p>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Inicializa ícones
        lucide.createIcons();

        // Função para trocar de tela (Login <-> Registro)
        function switchScreen(screen) {
            const login = document.getElementById('login-screen');
            const register = document.getElementById('register-screen');
            
            if(screen === 'register') {
                login.style.display = 'none';
                register.style.display = 'block';
            } else {
                login.style.display = 'block';
                register.style.display = 'none';
            }
            lucide.createIcons();
        }

        // Lógica de Autenticação e REDIRECIONAMENTO
        function handleAuth(event, type) {
            event.preventDefault(); // Impede a página de recarregar sozinha
            
            const btn = event.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            // Efeito visual de carregamento
            btn.innerHTML = "Processando...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            setTimeout(() => {
                if(type === 'login') {
                    const user = document.getElementById('login-user').value;
                    const pass = document.getElementById('login-pass').value;

                    // Teste Simples (Usuário: admin / Senha: 1234)
                    if(user === "admin" && pass === "1234") {
                        // AQUI ESTÁ O SEGREDO: Redireciona para a dashboard
                        window.location.href = "dashboard.html"; 
                    } else {
                        alert("Usuário ou senha incorretos! Tente admin e 1234");
                        btn.innerHTML = originalText;
                        btn.style.opacity = "1";
                        btn.style.pointerEvents = "auto";
                    }
                } else {
                    alert("Conta criada com sucesso! Agora faça login.");
                    switchScreen('login');
                    btn.innerHTML = originalText;
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                }
            }, 1000);
        }
    </script>
</body>
</html>
