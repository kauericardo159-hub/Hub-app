<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML HUB | Alpha Access</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos da Splash Screen de Entrada */
        #splash-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-core {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 35px;
            box-shadow: 0 0 50px var(--primary-glow);
            animation: splash-entrance 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .splash-core i { color: white; width: 55px; height: 55px; }

        .loading-line {
            margin-top: 30px;
            width: 140px;
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: progress-fill 2.5s ease-in-out forwards;
        }

        @keyframes splash-entrance {
            from { transform: scale(0) rotate(-20deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes progress-fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        #app-content { visibility: hidden; opacity: 0; transition: opacity 1s ease; }
    </style>
</head>
<body>

    <div id="splash-overlay">
        <div class="splash-core">
            <i data-lucide="zap"></i>
        </div>
        <div style="margin-top: 25px; font-weight: 900; letter-spacing: 5px; color: white; font-size: 1rem;">
            HTML <span class="highlight">HUB</span>
        </div>
        <div class="loading-line">
            <div class="loading-progress"></div>
        </div>
    </div>

    <div id="app-content">
        <div class="background-wrapper">
            <div class="glow-sphere pulse"></div>
            <div class="glow-sphere secondary"></div>
        </div>

        <main class="login-container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
            <div class="glass-card" id="auth-box" style="width: 100%; max-width: 400px; padding: 40px 30px;">
                
                <div style="text-align: center; margin-bottom: 35px;">
                    <h1 id="title-text" style="font-size: 1.8rem; font-weight: 900; margin-bottom: 8px;">Acesso HUB</h1>
                    <p id="desc-text" style="color: var(--text-dim); font-size: 0.85rem;">Insira suas credenciais Alpha.</p>
                </div>

                <form id="auth-form">
                    <div class="input-field">
                        <label>Usuário</label>
                        <div class="field-container">
                            <i data-lucide="user" class="field-icon"></i>
                            <input type="text" id="username" placeholder="Seu nome" required>
                        </div>
                    </div>

                    <div class="input-field">
                        <label>Senha de Acesso</label>
                        <div class="field-container">
                            <i data-lucide="lock" class="field-icon"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="cta-button" id="main-btn" style="margin-top: 15px;">
                        <span>Entrar no Sistema</span>
                        <i data-lucide="chevron-right"></i>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                    <p id="toggle-p" style="font-size: 0.8rem; color: var(--text-dim);">
                        Não possui ID? <a href="javascript:void(0)" onclick="toggleMode()" style="color: var(--primary); font-weight: 800; text-decoration: none;">Gerar ID Clássico</a>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // GESTÃO DA SPLASH SCREEN
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-overlay');
                const content = document.getElementById('app-content');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                content.style.visibility = 'visible';
                content.style.opacity = '1';
            }, 3000); // 3 segundos de carregamento
        });

        // LÓGICA DE REGISTRO / LOGIN
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            const title = document.getElementById('title-text');
            const desc = document.getElementById('desc-text');
            const btn = document.getElementById('main-btn');
            const toggleLink = document.getElementById('toggle-p');

            if (!isLogin) {
                title.textContent = "Novo Registro";
                desc.textContent = "Um ID numérico clássico será gerado.";
                btn.innerHTML = '<span>Criar Minha Conta</span> <i data-lucide="user-plus"></i>';
                toggleLink.innerHTML = 'Já tem uma conta? <a href="javascript:void(0)" onclick="toggleMode()" style="color: var(--primary); font-weight: 800; text-decoration: none;">Fazer Login</a>';
            } else {
                title.textContent = "Acesso HUB";
                desc.textContent = "Insira suas credenciais Alpha.";
                btn.innerHTML = '<span>Entrar no Sistema</span> <i data-lucide="chevron-right"></i>';
                toggleLink.innerHTML = 'Não possui ID? <a href="javascript:void(0)" onclick="toggleMode()" style="color: var(--primary); font-weight: 800; text-decoration: none;">Gerar ID Clássico</a>';
            }
            lucide.createIcons();
        }

        // GERADOR DE ID CLÁSSICO: HUB_00000000
        function generateClassicID() {
            const num = Math.floor(Math.random() * 90000000) + 10000000;
            return `HUB_${num}`;
        }

        document.getElementById('auth-form').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            
            if (!isLogin) {
                // REGISTRO
                const id = generateClassicID();
                const profile = {
                    name: user,
                    handle: user.toLowerCase().replace(/\s/g, ''),
                    bio: "Protocolo Alpha iniciado. Membro da rede HUB.",
                    img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`,
                    banner: "",
                    created: new Date().toLocaleDateString('pt-BR'),
                    hubID: id
                };
                localStorage.setItem("profile", JSON.stringify(profile));
                alert(`CONTA CRIADA!\nSeu ID: ${id}`);
                toggleMode();
            } else {
                // LOGIN
                const saved = JSON.parse(localStorage.getItem("profile"));
                if (saved && (user === saved.name || user === saved.hubID)) {
                    window.location.href = 'dashboard.html';
                } else if (user === "admin") {
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Acesso negado. Verifique os dados.");
                }
            }
        };
    </script>
</body>
</html>
