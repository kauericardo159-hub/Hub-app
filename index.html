<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dashboard Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="bg-blur-elements">
        <div class="circle cyan"></div>
        <div class="circle purple"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <header>
                <div class="logo-icon">
                    <i data-lucide="layout-dashboard"></i>
                </div>
                <h1>Olá novamente</h1>
                <p>Insira suas credenciais para acessar o painel.</p>
            </header>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" placeholder="Nome de usuário" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" placeholder="Sua senha secreta" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="login-button">
                    <span>Entrar</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <footer class="form-footer">
                <a href="#" class="link-secondary">Esqueceu a senha?</a>
                <p>Ainda não tem conta? <a href="#" class="link-primary">Cadastre-se</a></p>
            </footer>
        </div>
    </main>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        function handleLogin(event) {
            event.preventDefault();
            
            const button = document.getElementById('login-button');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Efeito visual de carregamento
            button.innerHTML = '<span>Verificando...</span>';
            button.style.opacity = '0.7';
            button.style.cursor = 'not-allowed';

            console.log("Dados capturados:", { user, pass });

            // Simulação de autenticação
            setTimeout(() => {
                if(user === "admin" && pass === "1234") {
                    alert("Login realizado com sucesso!");
                    // window.location.href = "dashboard.html"; // Redirecionamento futuro
                } else {
                    alert("Usuário ou senha incorretos.");
                    location.reload();
                }
            }, 1500);
        }
    </script>
</body>
</html>
