<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Premium | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="bg-blur-elements">
        <div class="circle cyan"></div>
        <div class="circle purple"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div id="auth-content">
                <header>
                    <div class="icon-box">✦</div>
                    <h1>Bem-vindo</h1>
                    <p>Conecte-se para acessar seu painel exclusivo.</p>
                </header>

                <div class="login-wrapper">
                    <div id="g_id_onload"
                        data-client_id="SEU_CLIENT_ID_REAL.apps.googleusercontent.com"
                        data-callback="handleAuth"
                        data-auto_prompt="false">
                    </div>

                    <div class="g_id_signin" 
                        data-type="standard" 
                        data-shape="pill" 
                        data-theme="filled_blue" 
                        data-text="signin_with" 
                        data-size="large" 
                        data-logo_alignment="left">
                    </div>
                </div>
            </div>

            <div id="profile-content" style="display: none;">
                <div class="profile-header">
                    <img id="user-avatar" src="" alt="Avatar">
                    <h2 id="user-name"></h2>
                    <span id="user-email"></span>
                </div>
                <nav class="profile-menu">
                    <button class="btn-primary">Acessar Dashboard</button>
                    <button class="btn-ghost" onclick="logout()">Sair</button>
                </nav>
            </div>
        </div>
    </main>

    <script>
        function handleAuth(response) {
            const payload = decodeJwt(response.credential);
            
            // Transição suave entre telas
            document.getElementById('auth-content').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('auth-content').style.display = 'none';
                const profile = document.getElementById('profile-content');
                profile.style.display = 'block';
                
                document.getElementById('user-avatar').src = payload.picture;
                document.getElementById('user-name').innerText = payload.name;
                document.getElementById('user-email').innerText = payload.email;
            }, 400);
        }

        function decodeJwt(token) {
            const base64Url = token.split('.')[1];
            return JSON.parse(atob(base64Url.replace(/-/g, '+').replace(/_/g, '/')));
        }

        function logout() {
            google.accounts.id.disableAutoSelect();
            location.reload();
        }
    </script>
</body>
</html>
