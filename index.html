<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Premium Cloud</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary rotate"></div>
    </div>

    <main class="login-container">
        <div class="glass-card main-card">
            <div class="card-header">
                <div class="brand-logo">
                    <i data-lucide="zap" class="logo-icon"></i>
                </div>
                <h1>Bem-vindo</h1>
                <p>Identifique-se para continuar com segurança.</p>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="input-field">
                    <label>Nome de Usuário</label>
                    <div class="field-container">
                        <i data-lucide="user" class="field-icon"></i>
                        <input type="text" id="username" placeholder="Seu apelido ou e-mail" required autocomplete="username">
                    </div>
                    <span class="error-msg" id="user-error"></span>
                </div>

                <div class="input-field">
                    <label>Sua Senha</label>
                    <div class="field-container">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePass()">
                            <i data-lucide="eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="cta-button" id="submit-btn">
                    <span class="btn-text">Entrar no Sistema</span>
                    <i data-lucide="chevron-right" class="btn-icon"></i>
                </button>
            </form>

            <div class="card-footer">
                <div class="divider"><span>ou acesse com</span></div>
                <div class="social-helpers">
                    <button class="social-btn"><i data-lucide="github"></i></button>
                    <button class="social-btn"><i data-lucide="twitter"></i></button>
                </div>
                <p class="signup-text">Novo por aqui? <a href="#">Crie sua conta</a></p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function handleAuth(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const text = btn.querySelector('.btn-text');
            
            // Estado de carregamento
            text.innerText = "Autenticando...";
            btn.classList.add('loading');

            // Simulação de delay de rede
            await new Promise(r => setTimeout(r, 2000));

            // Logica básica de exemplo
            const user = document.getElementById('username').value;
            if (user === "admin") {
                alert("Sucesso! Redirecionando...");
            } else {
                alert("Credenciais inválidas.");
                location.reload();
            }
        }
    </script>
</body>
</html>
