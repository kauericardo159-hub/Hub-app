<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML HUB | Acesso</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="login-container fade-in">
        <div class="glass-card" id="auth-card" style="width: 100%; max-width: 400px; padding: 40px;">
            
            <div class="card-header">
                <div class="brand-logo"><i data-lucide="zap"></i></div>
                <h1 id="auth-title">Bem-vindo</h1>
                <p id="auth-desc">Acesse sua conta para continuar.</p>
            </div>

            <form id="auth-form">
                <div class="input-field">
                    <label>Usuário</label>
                    <div class="field-container">
                        <i data-lucide="user" class="field-icon"></i>
                        <input type="text" id="username" placeholder="Seu nome de usuário" required>
                    </div>
                </div>

                <div class="input-field">
                    <label>Senha</label>
                    <div class="field-container">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="cta-button" id="submit-btn">
                    <span>Entrar no HUB</span>
                    <i data-lucide="chevron-right"></i>
                </button>
            </form>

            <div class="card-footer">
                <p id="toggle-text">Não tem conta? <a href="javascript:void(0)" onclick="toggleAuth()">Criar agora</a></p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        let isLogin = true;

        // Alternar entre Login e Registro
        function toggleAuth() {
            isLogin = !isLogin;
            const title = document.getElementById('auth-title');
            const desc = document.getElementById('auth-desc');
            const btn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');

            if (!isLogin) {
                title.textContent = "Nova Conta";
                desc.textContent = "Cadastre-se para gerar seu ID HUB.";
                btn.innerHTML = '<span>Criar Conta</span> <i data-lucide="user-plus"></i>';
                toggleText.innerHTML = 'Já tem conta? <a href="javascript:void(0)" onclick="toggleAuth()">Fazer Login</a>';
            } else {
                title.textContent = "Bem-vindo";
                desc.textContent = "Acesse sua conta para continuar.";
                btn.innerHTML = '<span>Entrar no HUB</span> <i data-lucide="chevron-right"></i>';
                toggleText.innerHTML = 'Não tem conta? <a href="javascript:void(0)" onclick="toggleAuth()">Criar agora</a>';
            }
            lucide.createIcons();
        }

        // Função para Gerar ID: HUB_XXXXXXXX (8 dígitos aleatórios)
        function generateHubID() {
            const numbers = Math.floor(10000000 + Math.random() * 90000000);
            return `HUB_${numbers}`;
        }

        // Lógica de Submissão
        document.getElementById('auth-form').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');

            btn.style.opacity = "0.6";
            btn.style.pointerEvents = "none";
            btn.innerText = "Aguarde...";

            setTimeout(() => {
                if (!isLogin) {
                    // MODO REGISTRO: Cria os dados iniciais
                    const newProfile = {
                        name: user,
                        handle: user.toLowerCase().replace(/\s/g, '_'),
                        bio: "Membro oficial do HTML HUB.",
                        img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`,
                        banner: "",
                        created: new Date().toLocaleDateString(),
                        hubID: generateHubID() // Gera o ID Único aqui
                    };
                    localStorage.setItem("profile", JSON.stringify(newProfile));
                    alert(`Conta criada! Seu ID é: ${newProfile.hubID}`);
                    toggleAuth();
                } else {
                    // MODO LOGIN
                    const saved = JSON.parse(localStorage.getItem("profile"));
                    
                    // Simulação: se não houver cadastro, aceita admin/1234 e gera um ID na hora
                    if (saved && user === saved.name) {
                        window.location.href = 'dashboard.html';
                    } else if (user === "admin" && pass === "1234") {
                        if(!saved) {
                             localStorage.setItem("profile", JSON.stringify({
                                name: "Admin", hubID: "HUB_00000000", created: "20/12/2025", handle: "admin", bio: "Administrador do Sistema"
                             }));
                        }
                        window.location.href = 'dashboard.html';
                    } else {
                        alert("Usuário não encontrado ou senha incorreta.");
                    }
                }
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
                btn.innerHTML = isLogin ? '<span>Entrar no HUB</span>' : '<span>Criar Conta</span>';
                lucide.createIcons();
            }, 1200);
        };
    </script>
</body>
</html>
