<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | HUB</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <main class="fade-in" style="padding: 20px; max-width: 500px; margin: 0 auto;">
        <div class="glass-card">
            <h2 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <i data-lucide="settings-2" style="color: var(--primary);"></i>
                Personalizar
            </h2>

            <form id="editForm">
                <div class="input-field">
                    <label>Nome de Exibição</label>
                    <div class="field-container">
                        <input type="text" id="editName" required>
                    </div>
                </div>

                <div class="input-field">
                    <label>Bio (Sua descrição)</label>
                    <div class="field-container">
                        <textarea id="editBio" style="width: 100%; background: none; border: none; color: white; padding: 15px; font-size: 0.9rem; min-height: 80px; resize: none;"></textarea>
                    </div>
                </div>

                <div class="input-field">
                    <label>Link da Foto (URL)</label>
                    <div class="field-container">
                        <input type="text" id="editImg" placeholder="https://...">
                    </div>
                </div>

                <div class="input-field">
                    <label>ID HUB (Não editável)</label>
                    <div class="field-container" style="opacity: 0.6; background: rgba(0,0,0,0.2);">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="text" id="staticID" readonly>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="window.location.href='perfil.html'" class="cta-button" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); box-shadow: none;">
                        Cancelar
                    </button>
                    <button type="submit" class="cta-button">
                        Salvar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const data = JSON.parse(localStorage.getItem("profile"));
        
        if(data) {
            document.getElementById('editName').value = data.name;
            document.getElementById('editBio').value = data.bio || "";
            document.getElementById('editImg').value = data.img || "";
            document.getElementById('staticID').value = data.hubID; // Mostra o ID clássico
        }

        document.getElementById('editForm').onsubmit = function(e) {
            e.preventDefault();
            data.name = document.getElementById('editName').value;
            data.bio = document.getElementById('editBio').value;
            data.img = document.getElementById('editImg').value;
            
            localStorage.setItem("profile", JSON.stringify(data));
            alert("Perfil atualizado com sucesso!");
            window.location.href = 'perfil.html';
        };
    </script>
</body>
</html>
