<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Rede HUB</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos para a Lista de Usuários Reais */
        .network-container {
            margin-top: 25px;
            padding-bottom: 80px;
        }
        .network-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .network-header h3 {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .online-badge {
            font-size: 0.6rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 700;
        }

        .user-scroll-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 18px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-item-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .user-main-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-mini-avatar {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            object-fit: cover;
        }

        .user-text-details strong {
            display: block;
            font-size: 0.85rem;
            color: white;
        }

        .user-text-details span {
            font-size: 0.7rem;
            color: var(--primary);
            font-family: monospace;
            font-weight: 700;
        }

        .status-indicator-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <header class="top-bar-dash fade-in" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
        <div class="logo-area">
            <span style="font-weight: 900; letter-spacing: 2px; font-size: 1.2rem;">HTML <span class="highlight">HUB</span></span>
        </div>
        <div id="topID" style="background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 10px; border: 1px solid var(--glass-border); font-family: monospace; font-size: 0.7rem; color: var(--success);">
            HUB_00000000
        </div>
    </header>

    <main class="fade-in" style="padding: 0 20px;">
        
        <section class="glass-card" style="padding: 20px; margin-bottom: 20px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), transparent);">
            <h1 style="font-size: 1.5rem; font-weight: 900;">Bem-vindo, <span id="userName">Usuário</span></h1>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 5px;">Painel de controle da rede Alpha ativado.</p>
        </section>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="glass-card" style="padding: 15px; text-align: center; cursor: pointer;" onclick="window.location.href='perfil.html'">
                <i data-lucide="user" style="color: var(--primary); margin-bottom: 8px;"></i>
                <span style="display: block; font-size: 0.7rem; font-weight: 800;">MEU PERFIL</span>
            </div>
            <div class="glass-card" style="padding: 15px; text-align: center; cursor: pointer;" onclick="window.location.href='editarperfil.html'">
                <i data-lucide="settings" style="color: var(--secondary); margin-bottom: 8px;"></i>
                <span style="display: block; font-size: 0.7rem; font-weight: 800;">AJUSTES</span>
            </div>
        </div>

        <section class="network-container">
            <div class="network-header">
                <h3>MEMBROS DA REDE</h3>
                <span class="online-badge" id="memberCount">0 Online</span>
            </div>

            <div class="user-scroll-list" id="userListContainer">
                <div style="text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.8rem;">
                    Sincronizando banco de dados...
                </div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item active">
            <i data-lucide="layout-grid"></i>
            <span>Painel</span>
        </button>
        <button class="nav-item" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        function setupDashboard() {
            // Pega o usuário logado no momento
            const currentUser = JSON.parse(localStorage.getItem("profile"));
            
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            // Atualiza interface básica
            document.getElementById('userName').textContent = currentUser.name.split(' ')[0];
            document.getElementById('topID').textContent = currentUser.hubID;

            renderUserList(currentUser);
        }

        function renderUserList(me) {
            const container = document.getElementById('userListContainer');
            const counter = document.getElementById('memberCount');

            // Simulação de banco de dados (Pegamos o usuário atual + administradores do sistema)
            // Se você quiser que apareçam todos os usuários cadastrados no dispositivo, 
            // precisaria salvar cada cadastro num array no localStorage.
            const globalUsers = [
                { name: "Sistema HUB", hubID: "HUB_00000000", img: "https://api.dicebear.com/7.x/bottts/svg?seed=Hub" },
                { name: "Suporte Alpha", hubID: "HUB_00000001", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Support" }
            ];

            // Adiciona você na lista
            globalUsers.unshift(me);

            container.innerHTML = '';
            counter.textContent = `${globalUsers.length} Online`;

            globalUsers.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-item-card';
                card.innerHTML = `
                    <div class="user-main-info">
                        <img src="${user.img}" class="user-mini-avatar">
                        <div class="user-text-details">
                            <strong>${user.name}</strong>
                            <span>${user.hubID}</span>
                        </div>
                    </div>
                    <div class="status-indicator-dot"></div>
                `;
                container.appendChild(card);
            });
        }

        setupDashboard();
    </script>
</body>
</html>
