<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Inicial | HTML Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
        <div class="glow-sphere secondary"></div>
    </div>

    <nav class="top-bar glass-card">
        <div class="brand-small">
            <i data-lucide="zap"></i>
            <span>HTML HUB</span>
        </div>
        <div class="top-actions">
            <button class="icon-btn" onclick="alert('Nenhuma notificação')">
                <i data-lucide="bell"></i>
                <span class="badge"></span>
            </button>
        </div>
    </nav>

    <main class="content-container">
        <section class="view-section">
            <div class="welcome-banner">
                <h1>Olá, <span id="display-name" class="highlight">Explorador</span>!</h1>
                <p>O que vamos criar hoje?</p>
            </div>

            <div class="quick-actions">
                <div class="action-card glass-card" onclick="window.location.href='perfil.html'">
                    <div class="icon-wrap cyan"><i data-lucide="folder-plus"></i></div>
                    <span>Ver Projetos</span>
                </div>
                <div class="action-card glass-card" onclick="window.location.href='perfil.html'">
                    <div class="icon-wrap purple"><i data-lucide="user-cog"></i></div>
                    <span>Editar Perfil</span>
                </div>
            </div>

            <div class="recent-activity glass-card">
                <h3 style="color: white; margin-bottom: 15px; font-size: 1rem;">Status da Conta</h3>
                <div class="activity-item">
                    <div class="dot active"></div>
                    <div class="activity-info">
                        <strong>Armazenamento Local</strong>
                        <span>Ativo (Navegador)</span>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="dot active"></div>
                    <div class="activity-info">
                        <strong>Sincronização Vercel</strong>
                        <span>Online</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i>
            <span>Início</span>
        </button>
        <button class="nav-item" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        // Inicia os ícones
        lucide.createIcons();

        // Tenta carregar o nome que o utilizador definiu no perfil.html
        function loadUserData() {
            const savedProfile = localStorage.getItem("profile");
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                document.getElementById('display-name').textContent = profile.name.split(' ')[0];
            }
        }

        loadUserData();
    </script>
</body>
</html>
