<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saindo... | HTML HUB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .logout-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-msg {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        .sub-msg {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="dashboard-body">

    <div class="background-wrapper">
        <div class="glow-sphere pulse"></div>
    </div>

    <main class="logout-screen fade-in">
        <div class="loader-ring"></div>
        
        <div class="status-msg" id="msg">Encerrando Sessão...</div>
        <div class="sub-msg" id="sub-msg">Limpando registros do ID HUB</div>
        
        <div id="icon-success" style="display: none; margin-top: 20px;">
            <i data-lucide="check-circle-2" style="color: var(--success); width: 48px; height: 48px;"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Lógica de Saída
        setTimeout(() => {
            // Opcional: Limpar apenas dados de sessão ou tudo?
            // Se quiser que o usuário TENHA que criar outra conta: localStorage.clear();
            // Se quiser apenas deslogar e manter o ID salvo: 
            // Apenas redirecionamos, pois o login.html já pede senha.

            document.getElementById('msg').textContent = "Sessão Encerrada";
            document.getElementById('sub-msg').textContent = "Redirecionando para o Login";
            document.querySelector('.loader-ring').style.display = 'none';
            document.getElementById('icon-success').style.display = 'block';
            lucide.createIcons();

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);

        }, 2000);
    </script>
</body>
</html>
